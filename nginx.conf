# ============================================================
# ReBrew — Nginx Configuration
# File: /etc/nginx/sites-available/rebrew
#
# Serves:
#   api.rebrew.in  → Node.js backend (port 5000)
#   rebrew.in      → Static frontend (HTML/CSS/JS)
#   www.rebrew.in  → 301 redirect to rebrew.in
#
# After editing:
#   nginx -t && systemctl reload nginx
# ============================================================


# ── Rate limiting zones (global, outside server blocks) ─────
# Keyed by $binary_remote_addr — memory-efficient IP tracking.
# 10m zone = ~160,000 unique IPs stored.

# General API: 100 requests per minute per IP
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;

# Auth endpoints: 10 requests per minute (brute force protection)
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

# Webhook: 30 requests per minute (Stripe retries in bursts)
limit_req_zone $binary_remote_addr zone=webhook:10m rate=30r/m;

# Upload: 10 requests per minute
limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;


# ── Redirect HTTP → HTTPS for all domains ───────────────────
server {
    listen 80;
    listen [::]:80;
    server_name rebrew.in www.rebrew.in api.rebrew.in;

    # Allow Certbot ACME challenge through before redirect
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}


# ── Redirect www → non-www (SEO canonical) ──────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.rebrew.in;

    # Uses the same cert as rebrew.in (issued together with -d rebrew.in -d www.rebrew.in)
    ssl_certificate     /etc/letsencrypt/live/rebrew.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rebrew.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    return 301 https://rebrew.in$request_uri;
}


# ── Frontend: rebrew.in ──────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rebrew.in;

    # SSL — issued by: certbot --nginx -d rebrew.in -d www.rebrew.in
    # Cert is stored at /etc/letsencrypt/live/rebrew.in/ (first domain in the command)
    ssl_certificate     /etc/letsencrypt/live/rebrew.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rebrew.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "SAMEORIGIN"    always;
    add_header X-Content-Type-Options     "nosniff"       always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    # CSP for static frontend pages
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://res.cloudinary.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.rebrew.in https://js.stripe.com; frame-src https://js.stripe.com; object-src 'none';" always;

    # ── Document root ─────────────────────────────────────────
    root  /var/www/rebrew;
    index index.html;

    # ── Static file caching ───────────────────────────────────
    location ~* \.(css|js|woff2?|ttf|eot|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(jpg|jpeg|png|webp|gif)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Multi-page site fallback ──────────────────────────────
    # ReBrew is 12 separate .html files — not a SPA.
    # try_files checks: exact file → directory/index → file.html → 404
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # ── Block hidden files ────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Logging ───────────────────────────────────────────────
    access_log /var/log/nginx/rebrew-frontend-access.log;
    error_log  /var/log/nginx/rebrew-frontend-error.log;
}


# ── Backend API: api.rebrew.in ───────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.rebrew.in;

    # SSL — issued by: certbot --nginx -d api.rebrew.in (separate command)
    # Cert is stored at /etc/letsencrypt/live/api.rebrew.in/
    ssl_certificate     /etc/letsencrypt/live/api.rebrew.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.rebrew.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY"           always;
    add_header X-Content-Type-Options     "nosniff"        always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;

    # ── Request size limits ───────────────────────────────────
    client_max_body_size  6M;     # Slightly above multer's 5MB image limit
    client_body_timeout   15s;
    client_header_timeout 10s;

    # ── Proxy shared settings ─────────────────────────────────
    proxy_http_version      1.1;
    proxy_set_header        Upgrade           $http_upgrade;
    proxy_set_header        Connection        'keep-alive';
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    # Use $remote_addr (not $proxy_add_x_forwarded_for) — prevents clients from
    # injecting spoofed IPs to bypass Express rate limiting with trust proxy: 1
    proxy_set_header        X-Forwarded-For   $remote_addr;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_cache_bypass      $http_upgrade;
    proxy_read_timeout      35s;   # Slightly above Node's 30s server.timeout
    proxy_connect_timeout   5s;
    proxy_send_timeout      30s;
    proxy_buffer_size       4k;
    proxy_buffers           8 4k;

    # ── Stripe Webhook ────────────────────────────────────────
    # CRITICAL: proxy_request_buffering off — Nginx must not buffer the body.
    # express.raw() in app.js captures the raw Buffer for Stripe signature
    # verification. If Nginx buffers and reassembles, the Buffer is still correct,
    # but disabling buffering reduces latency and avoids edge-case issues with
    # very large webhook payloads hitting proxy_buffer limits.
    location = /api/v1/payments/webhook {
        limit_req zone=webhook burst=20 nodelay;
        limit_req_status 429;

        proxy_pass              http://127.0.0.1:5000;
        proxy_request_buffering off;
    }

    # ── Auth endpoints — strict rate limit ───────────────────
    location ~ ^/api/v1/auth/(login|register|forgot-password|reset-password) {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:5000;
    }

    # ── Upload endpoints ─────────────────────────────────────
    location ~ ^/api/v1/(products|events) {
        limit_req zone=upload burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:5000;
    }

    # ── All other API routes ──────────────────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:5000;
    }

    # ── Health check — no rate limit, no access logging ──────
    location = /health {
        proxy_pass http://127.0.0.1:5000;
        access_log off;
    }

    # ── Block hidden files ────────────────────────────────────
    location ~ /\. {
        deny all;
    }

    # ── Logging ───────────────────────────────────────────────
    access_log /var/log/nginx/rebrew-api-access.log;
    error_log  /var/log/nginx/rebrew-api-error.log;
}
